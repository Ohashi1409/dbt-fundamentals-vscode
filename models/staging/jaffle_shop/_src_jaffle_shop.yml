sources:
  - name: jaffle_shop
    description: Jaffle Shop schema to learn dbt
    database: dbt-tutorial
    schema: jaffle_shop
    tables:
      - name: customers
        description: Customers table to learn dbt
        columns: 
          - name: id
            description: primary key
            data_tests:
              - unique
              - not_null
      - name: orders
        description: Orders table to learn dbt
        columns:  
          - name: id
            description: primary key
            data_tests:
              - unique
              - not_null
          - name: user_id
            description: foreign key from customers table
            data_tests: 
              - relationships:
                  arguments:
                    to: source('jaffle_shop', 'customers')
                    field: id
          - name: status
            description: order status
            data_tests:
              - accepted_values:
                  arguments:
                    values:
                      - placed
                      - shipped
                      - returned
                      - completed
                      - return_pending
        config:
          loaded_at_field: _etl_loaded_at
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after: 
              count: 1
              period: day