models:
  - name: stg_jaffle_shop__customers
    description: Staging table for Customers
    columns:
      - name: customer_id
        description: primary key
        data_tests:
          - unique
          - not_null
  - name: stg_jaffle_shop__orders
    description: Staging table for Orders
    columns: 
      - name: order_id
        description: primary key
        data_tests: 
          - unique
          - not_null
      - name: customer_id
        description: foreign key from customers
        data_tests: 
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: status 
        description: order status
        data_tests: 
          - accepted_values:
              arguments:
                values:
                  - placed
                  - shipped
                  - returned
                  - completed
                  - return_pending