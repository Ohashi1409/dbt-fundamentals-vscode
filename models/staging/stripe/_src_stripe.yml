sources:
  - name: stripe
    description: Stripe schema to learn dbt
    database: dbt-tutorial
    schema: stripe  
    tables:
      - name: payment
        description: "Payment table to learn dbt"
        columns: 
          - name: id
            description: primary key
            data_tests:
              - unique
              - not_null
          - name: orderid
            description: foreign key from orders table
            data_tests:
              - not_null
              - relationships:
                  arguments: 
                    to: source('jaffle_shop', 'orders')
                    field: id
          - name: paymentmethod
            description: payment method
            data_tests: 
              - accepted_values:
                  arguments:
                    values: 
                      - bank_transfer
                      - coupon
                      - gift_card
                      - credit_card
                      - debit_card
          - name: status
            description: payment status
            data_tests:
              - accepted_values: 
                  arguments: 
                    values:
                      - success
                      - fail
        config:
          loaded_at_field: _batched_at
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 1
              period: day